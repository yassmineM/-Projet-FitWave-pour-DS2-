name: CI FitWave Docker

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Vérifier fichier HTML
        run: |
          if [ ! -f index.html ]; then
            echo "Erreur : index.html introuvable"
            exit 1
          fi

      - name: Build Docker image
        run: docker build -t fitwave-app .
