name: CI FitWave

name: CI FitWave Docker

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. TEST (Étape obligatoire du point 3 de l'énoncé)
      - name: Vérifier présence fichiers essentiels
        run: |
          if [ ! -f index.html ]; then
            echo "Erreur : index.html manquant !"
            exit 1
          fi
          echo "Fichiers validés."

      # 3. BUILD DOCKER (Étape obligatoire du point 3)
      - name: Build Docker image
        run: docker build -t fitwave-app .

      # 4. SECURITY SCAN (Bonus du point 3)
      - name: Docker Image Scan
        uses: snyk/actions/docker@master
        continue-on-error: true # Pour ne pas bloquer si Snyk n'est pas configuré
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
            echo "Erreur : index.html manquant"
            exit 1
          fi

      # 4. BUILD DOCKER
      - name: Build Docker image
        run: docker build -t fitwave .
